<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Production Order System</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="header-content">
            <h1>Production Order System</h1>
            <span id="status-badge">Checking...</span>
        </div>
    </header>

    <main>
        <section class="card" id="section-form">
            <h2>New Production Order</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label for="product">Product</label>
                    <input type="text" id="product" placeholder="Ex: WEG Electric Motor">
                </div>
                <div class="form-group">
                    <label for="quantity">Quantity</label>
                    <input type="number" id="quantity" placeholder="Ex: 100" min="1">
                </div>
                <div class="form-group">
                    <label for="initial-status">Initial Status</label>
                    <select id="initial-status">
                        <option value="Pending">Pending</option>
                        <option value="In Progress">In Progress</option>
                        <option value="Completed">Completed</option>
                    </select>
                </div>
            </div>
            <button id="btn-register" onclick="createOrder()">Register Order</button>
            <div id="message-box" class="message hidden"></div>
        </section>

        <section class="card" id="section-list">
            <div class="list-header">
                <h2>Registered Orders</h2>
                <button onclick="loadOrders()" class="btn-refresh">Refresh List</button>
            </div>
            
            <div id="loading" class="hidden">Loading...</div>
            
            <div class="table-container">
                <table id="orders-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Product</th>
                            <th>Qty</th>
                            <th>Status</th>
                            <th>Created At</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="table-body"></tbody>
                </table>
            </div>
            <p id="no-data" class="hidden">No orders registered.</p>
        </section>
    </main>

    <script src="script.js" defer></script>
</body>
</html>
